<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТурАгентство - Главная</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <!-- Навигация -->
    <nav class="bg-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-600">Sea & Mountains</h1>
        <div class="flex items-center space-x-4">
            <span class="text-gray-600">Баланс: {{ user.balance }} руб.</span>
            <a href="{{ url_for('profile') }}" class="hover:opacity-80">
                <img src="https://ui-avatars.com/api/?name={{ user.username }}&background=0D8ABC&color=fff" alt="Аватар" class="w-10 h-10 rounded-full border-2 border-blue-500">
            </a>
        </div>
    </nav>

    <!-- Контент -->
    <div class="container mx-auto py-8">
        <h2 class="text-3xl font-bold text-center mb-8">Выберите ваше следующее приключение</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            {% for tour in tours %}
            <div class="bg-white rounded-xl shadow-lg overflow-hidden transition-transform hover:scale-105">
                <img src="/{{ tour.image_url }}" alt="{{ tour.title }}" class="w-full h-48 object-cover">
                <div class="p-6">                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-semibold text-blue-500 uppercase">{{ tour.category }}</span>
                        <span class="text-lg font-bold text-gray-800">{{ tour.price }} руб.</span>
                    </div>
                    <h3 class="text-xl font-bold mb-2">{{ tour.title }}</h3>
                    <p class="text-gray-600 mb-4">{{ tour.description }}</p>
                    <form action="{{ url_for('add_to_cart', tour_id=tour.id) }}" method="post">
                        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
                            В корзину
                        </button>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
